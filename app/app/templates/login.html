<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - MailFilter</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      border: 1px solid var(--gray-200);
      max-width: 420px;
      width: 100%;
      margin: 1rem;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-brand .logo-leaf {
      width: 32px;
      height: 32px;
      margin: 0 auto 0.5rem;
      display: block;
    }

    .login-brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--green-primary);
    }

    .login-brand p {
      color: var(--gray-500);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--green-dark);
      margin-bottom: 0.35rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.65rem 2.5rem 0.65rem 0.85rem;
      border: 1.5px solid var(--gray-300);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: var(--font);
      color: var(--green-dark);
      background: var(--white);
      transition: border-color 0.2s;
      outline: none;
    }

    .input-wrap input:focus {
      border-color: var(--green-primary);
    }

    .input-wrap input.is-valid {
      border-color: var(--green-light);
    }

    .input-wrap input.is-invalid {
      border-color: var(--red-500);
    }

    .input-status {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      line-height: 1;
    }

    .input-status.valid { color: var(--green-light); }
    .input-status.invalid { color: var(--red-500); }
    .input-status.loading { color: var(--gray-500); }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--gray-300);
      border-radius: 8px;
      background: var(--white);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: var(--font);
      color: var(--green-dark);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .btn-google:hover:not(:disabled) {
      background: var(--gray-100);
      border-color: var(--green-accent);
      box-shadow: 0 2px 8px rgba(45, 106, 79, 0.1);
    }

    .btn-google:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-google svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .info-text {
      font-size: 0.8rem;
      color: var(--gray-500);
      line-height: 1.5;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--gray-200);
    }

    .info-text strong {
      color: var(--green-accent);
    }

    .error-banner {
      background: #FDE8E8;
      color: var(--red-500);
      padding: 0.65rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-brand">
    <span class="logo-leaf"></span>
    <h1>MailFilter</h1>
    <p>Stop physical junk mail for good.</p>
  </div>

  {% if error %}
  <div class="error-banner">{{ error }}</div>
  {% endif %}

  <div class="form-group">
    <label for="invite-code">Invite Code</label>
    <div class="input-wrap">
      <input
        type="text"
        id="invite-code"
        name="invite_code"
        placeholder="BETA-XXXX"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="characters"
      >
      <span id="invite-status" class="input-status"></span>
    </div>
  </div>

  <button id="google-btn" class="btn-google" disabled>
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </button>

  <div class="info-text">
    MailFilter uses your Gmail to scan <strong>USPS Informed Delivery</strong>
    emails. We only read Informed Delivery messages — nothing else.
    <br><br>
    Your mail images are encrypted and never shared.
  </div>
</div>

<script>
(function() {
  const input = document.getElementById('invite-code');
  const statusEl = document.getElementById('invite-status');
  const googleBtn = document.getElementById('google-btn');

  let debounceTimer = null;
  let lastValidCode = '';

  function setStatus(state) {
    statusEl.className = 'input-status';
    input.classList.remove('is-valid', 'is-invalid');
    if (state === 'valid') {
      statusEl.textContent = '\u2713';
      statusEl.classList.add('valid');
      input.classList.add('is-valid');
      googleBtn.disabled = false;
    } else if (state === 'invalid') {
      statusEl.textContent = '\u2717';
      statusEl.classList.add('invalid');
      input.classList.add('is-invalid');
      googleBtn.disabled = true;
      lastValidCode = '';
    } else if (state === 'loading') {
      statusEl.textContent = '\u2026';
      statusEl.classList.add('loading');
      googleBtn.disabled = true;
    } else {
      statusEl.textContent = '';
      googleBtn.disabled = true;
      lastValidCode = '';
    }
  }

  async function validateCode(code) {
    if (!code || code.length < 2) {
      setStatus('');
      return;
    }
    setStatus('loading');
    try {
      const resp = await fetch('/auth/validate-invite?code=' + encodeURIComponent(code));
      const data = await resp.json();
      // Only update if input hasn't changed
      if (input.value.trim().toUpperCase() === code.toUpperCase()) {
        if (data.valid) {
          lastValidCode = code;
          setStatus('valid');
        } else {
          setStatus('invalid');
        }
      }
    } catch (err) {
      setStatus('invalid');
    }
  }

  input.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    const val = input.value.trim();
    if (!val) {
      setStatus('');
      return;
    }
    debounceTimer = setTimeout(function() {
      validateCode(val);
    }, 350);
  });

  googleBtn.addEventListener('click', function() {
    const code = input.value.trim();
    if (!code || googleBtn.disabled) return;
    window.location.href = '/auth/google?invite_code=' + encodeURIComponent(code);
  });
})();
</script>

</body>
</html>
